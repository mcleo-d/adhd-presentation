<script type="application/json" id="speaker-notes">
[
  "*(Montage rolling. Talk over it before you introduce yourself.)*\n\n- **\"Every photo you're looking at has something in common. It was there in all of them, shaping me, and I had no idea. That thing is ADHD.\"**\n- These pictures span my whole life. Birth, to now, to 50.\n- Quick, honest housekeeping, say it light: **\"Before I go further, I'm not a doctor. Nothing here is medical advice. This is just my story.\"**\n- The promise: **\"By the end I'll have joined the dots on these photos. And some of you might recognise your own life in them.\"**\n- *Then:* \"I'm James.\"\n\n[PAUSE]. Let the montage finish before the first content slide.",
  "- For most of my life there were two versions of me running at once.\n- **What people saw:** capable, calm, creative, dependable. The bland mask that got me through.\n- **What it actually took:** swimming upstream every day. Hiding the effort from everyone. A relentless effort just to participate.\n- The gap between those two is where the imposter feeling lived.\n- **\"Everyone found work easy. It was like they got a manual I never received.\"** Same room, same task, totally different experience.\n- I didn't have a word for it. So I assumed it was me. A flaw. Something to push through.\n\n[PAUSE]",
  "*(This is the heart. Slow down. Don't rush to the diagnosis.)*\n\n- Two things happened at almost the same time.\n- **\"I hit a wall at work.\"** Be honest but measured: name it, don't dwell in it. One line on what that felt like.\n- **\"Then someone close to me was diagnosed with ADHD.\"**\n- Sitting in that, hearing the description, I was hearing my own life read back to me.\n\n[PAUSE]. This is your biggest pause of the talk.\n\n- Bridge line, said into the silence (**no slide change**):\n- **\"And it made me ask a question I couldn't un-ask. What if it had been there the whole time?\"**\n- The decision, on screen and in your own words: **\"I decided to explore my own diagnosis.\"**",
  "- When you're diagnosed late, you never fully stop asking: is this real, or am I making it up?\n- I want to play you something. This was the moment I stopped asking. It's from the **ADHD Chatter with Alex Partridge** podcast (the show is linked under the clip).\n- A quick frame before you press play: it's a short cue, only the closing line, but it lands the whole reframe in one breath.\n\n▶ PLAY CLIP. Spotify, episode `2WwEe8tImYLtlPScYzK5db`, **start 14:24**, **stop after \"...lean into those\"** (~14:50). *It's about 26 seconds. Cue it before you start. Share tab/system audio. Don't talk over it.*\n\n[PAUSE]. Let the clip's last line hang for a second.\n\n- Pick it up: that's been my whole career. Built around things I'm genuinely interested in. Solving problems in ways that don't always look conventional.\n- The honest flip side: **\"Seeing things differently is one thing. Getting other people to see what I see: that's the real work. I'm still learning to bridge that gap.\"**\n- The reframe (say it plainly, this is the turn). The \"Before\" panel names what it felt like to run on the wrong system; the \"After\" line is the moment it changed:\n- **\"For 49 years I thought I was lazy, or broken, or just... different. I wasn't any of those. I was running a different operating system. Once I understood that, everything else started to make sense.\"**\n- Land the supporting line on the slide in your own words: **\"Same hardware, running differently. The shame I'd carried went quiet along with the noise.\"**",
  "*(Three legs: understanding, medication, the difference. Watch your clock here; if you overrun, trim the hyperfocus detail. The climax has moved off this slide; this one is the personal payoff.)*\n\n**Understanding (the biggest one)**\n- The relief wasn't \"now I'm fixed.\" It was: it had a name, and it was never a character flaw. The slide says it in fuller form: the diagnosis didn't change who I was, it changed the story I'd been telling myself about why things were hard.\n\n**The work story (the concrete bit)**\n- Before, in meetings: technically demanding, context switching fast, and I was brand new to the place.\n- **\"I couldn't follow. I couldn't show people who I actually was. And I knew something was wrong; I just thought it was my age. It wasn't. It was ADHD I'd carried my whole life.\"**\n- The everyday cost (say this slowly, it'll land): **\"I was avoiding taking anything on. Staying on top of what was already in front of me was enough. The thought of one more task, however small, felt overbearing.\"**\n\n[PAUSE]\n\n**Medication & monitoring (spoken only; NOT on the slide)**\n- Frame it as new and unfinished: **\"I was formally diagnosed on the 29th of August 2025. So I'm about nine months in, still being titrated, still figuring this out.\"**\n- What it is, plainly: Elvanse is a stimulant medication for ADHD, prescribed and monitored by a clinician.\n- The monitoring detail (good modelling for this room): **\"Because it's a stimulant, I check my blood pressure and heart rate regularly. That's part of managing it properly.\"** *(Frame intervals as what YOUR clinician set, not a general rule.)*\n\n**The difference (avoid \"miracle\")**\n- **\"The difference was night and day. For the first time, the noise went quiet and I could just... think.\"**\n\n**Hyperfocus: both sides, no incident (trim first if overrunning)**\n- **\"One thing I've felt kick in is hyperfocus. I'll lock into a meeting I'm enjoying and the questions and ideas just keep coming. It's the version of me that was locked away for years, finally in the room.\"**\n- The flip side: it can be a lot, and the right level is still being tuned. That's the honest reality of being early in this. *(If asked in Q&A: leading ADHD researchers push back on calling this a superpower, because you can't control when it switches on or where it points.)*\n\n- Land the footer line, then move on: **\"Understanding it changed everything. But it can't stop with me.\"**",
  "*(This is your close now: work-focused and hopeful. Make the ask of the room, then land the final line.)*\n\n- The phrase I dislike: **\"ADHD is a superpower.\"** It hides how hard the daily management is and piles on pressure to over-deliver. I'm not Superman.\n- The ask: people with ADHD shouldn't just be \"the alternative view\" round the table, wheeled out for a fresh angle, then talked over. **How you speak to us, how you run a meeting: it decides whether we contribute or spend the whole time masking.**\n- Three things, in plain terms (the cards on the slide say the same in fuller form):\n  - **Notice before someone has to ask.** Many of us learned to hide the struggle long before we understood it; a quiet, genuine question matters far more than waiting for someone to put their hand up.\n  - **Make room for a different mind.** When an idea doesn't fit the usual shape, stay with it for a moment rather than moving briskly on. That's often where the real value is.\n  - **Reduce the noise, not the expectations.** Clear priorities and fewer interruptions help far more than being told to try harder. Effort was never the thing in short supply.\n- Final line, say it to the room then stop: **\"If you've spent your life feeling one step out of sync, you're not broken. You might just be wired differently. And it's never too late to find that out.\"**\n- [PAUSE]. Then: \"Thank you. I'd love to take any questions.\"",
  "*(Resources on screen. Say your last words OVER them; don't read the list aloud.)*\n\n- Restate, plainly: **\"Last thing: I'm not a medical professional. This has been my experience, and only mine.\"**\n- If something here rang a bell, there are places to start. They're on the screen.\n- One honest caveat to say aloud: **\"NHS Right to Choose can really cut the wait, but it's England only, and some areas have paused or restricted it. So check the current position before you get your hopes up.\"**\n- Aviva health scheme is there for anyone on the corporate plan.\n- The charities on screen are run by and for people like us.\n- The closing line on the slide says it for you; you don't need to read it aloud, but if it lands naturally: **\"You're not broken. You might just be wired differently. And it's never too late to find out.\"**"
]
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="slides.jsx?v=40"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
  const { useEffect } = React;
  const S = window.Slides;

  // ── Tweaks ────────────────────────────────────────────────────────────────
  // The state shape is JSON between the EDITMODE markers below — the host
  // rewrites this block on disk when the user changes a value, so tweaks
  // survive reload. Keep the shape stable; rename keys with caution.
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "#F4A24C",
    "tone": "warm",
    "pace": "gentle"
  }/*EDITMODE-END*/;

  // Accent swatches — each is [base, deep, soft-rgba, glow-rgba].
  const ACCENTS = {
    '#6C5CE7': { deep: '#5848C5', soft: 'rgba(108, 92, 231, 0.18)', glow: 'rgba(108, 92, 231, 0.10)' }, // indigo
    '#F4A24C': { deep: '#C97A2A', soft: 'rgba(244, 162, 76, 0.18)', glow: 'rgba(244, 162, 76, 0.10)' }, // amber
    '#3DCABC': { deep: '#239F92', soft: 'rgba(61, 202, 188, 0.18)', glow: 'rgba(61, 202, 188, 0.10)' }, // teal
    '#F47C6A': { deep: '#C8533F', soft: 'rgba(244, 124, 106, 0.18)', glow: 'rgba(244, 124, 106, 0.10)' }, // coral
  };

  // Theme tones — cool (Linear default) or warm (the v1 charcoal feel).
  const TONES = {
    cool: {
      '--bg': '#0E1116', '--bg-quiet': '#0A0D11',
      '--bg-lift': '#161A21', '--bg-lift-2': '#1B202A',
      '--ink': '#EDEEF2', '--ink-soft': '#9AA1AD', '--ink-mute': '#6E7480',
      '--rule': 'rgba(237, 238, 242, 0.08)',
      '--rule-strong': 'rgba(237, 238, 242, 0.16)',
      '--rule-bright': 'rgba(237, 238, 242, 0.28)',
      bodyBg: '#07090C',
    },
    warm: {
      '--bg': '#1B1814', '--bg-quiet': '#100E0C',
      '--bg-lift': '#221E19', '--bg-lift-2': '#2A2620',
      '--ink': '#F2EBE0', '--ink-soft': '#BDB3A5', '--ink-mute': '#7F786F',
      '--rule': 'rgba(242, 235, 224, 0.08)',
      '--rule-strong': 'rgba(242, 235, 224, 0.16)',
      '--rule-bright': 'rgba(242, 235, 224, 0.28)',
      bodyBg: '#0A0907',
    },
  };

  // Motion paces — "precise" is Linear-style; "gentle" restores the v1 floaty
  // breathing-room feel; "instant" turns off transitions (useful for capture).
  const PACES = {
    precise: { slow: 500,  glacial: 900,  stagger: 80,  staggerQuiet: 500 },
    gentle:  { slow: 900,  glacial: 1600, stagger: 220, staggerQuiet: 750 },
    instant: { slow: 1,    glacial: 1,    stagger: 0,   staggerQuiet: 0 },
  };

  const mounts = [
    ['s00', S.S00_Title],
    ['s01', S.S01_TwoVersions],
    ['s02', S.S02_TheWall],
    ['s03', S.S03_OperatingSystem],
    ['s04', S.S04_WhatChanged],
    ['s05', S.S05_GoodSupport],
    ['s06', S.S06_Resources],
  ];

  // Mount slides immediately. They read all theme/accent/pace values from CSS
  // custom properties, so the App wrapper (below) just patches :root and the
  // slides re-render visually without prop drilling.
  for (const [id, Comp] of mounts) {
    const el = document.getElementById(id);
    if (el) ReactDOM.createRoot(el).render(<Comp />);
  }

  // ── App wrapper for the Tweaks panel only ────────────────────────────────
  // Mounts into a dedicated host element so it sits alongside the deck, not
  // inside a slide. CSS-var patching happens in the effect.
  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

    useEffect(() => {
      const root = document.documentElement;

      // Accent
      const a = ACCENTS[t.accent] || ACCENTS['#6C5CE7'];
      root.style.setProperty('--accent', t.accent);
      root.style.setProperty('--accent-deep', a.deep);
      root.style.setProperty('--accent-soft', a.soft);
      root.style.setProperty('--accent-glow', a.glow);

      // Tone
      const tone = TONES[t.tone] || TONES.cool;
      for (const [k, v] of Object.entries(tone)) {
        if (k === 'bodyBg') document.body.style.background = v;
        else root.style.setProperty(k, v);
      }

      // Pace
      const pace = PACES[t.pace] || PACES.precise;
      root.style.setProperty('--t-slow', pace.slow + 'ms');
      root.style.setProperty('--t-glacial', pace.glacial + 'ms');
      root.style.setProperty('--reveal-stagger', pace.stagger + 'ms');
      root.style.setProperty('--reveal-stagger-quiet', pace.staggerQuiet + 'ms');
    }, [t]);

    return (
      <TweaksPanel title="Tweaks">
        <TweakSection label="Accent colour" />
        <TweakColor
          label="Accent"
          value={t.accent}
          options={['#6C5CE7', '#F4A24C', '#3DCABC', '#F47C6A']}
          onChange={(v) => setTweak('accent', v)}
        />
        <TweakSection label="Theme tone" />
        <TweakRadio
          label="Tone"
          value={t.tone}
          options={['cool', 'warm']}
          onChange={(v) => setTweak('tone', v)}
        />
        <TweakSection label="Motion" />
        <TweakRadio
          label="Reveal pace"
          value={t.pace}
          options={['precise', 'gentle', 'instant']}
          onChange={(v) => setTweak('pace', v)}
        />
      </TweaksPanel>
    );
  }

  // Mount the tweaks app into its own host so it doesn't sit inside a slide.
  const tweaksHost = document.getElementById('tweaks-host');
  if (tweaksHost) ReactDOM.createRoot(tweaksHost).render(<App />);
</script>

</body>
