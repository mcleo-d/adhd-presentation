[build]
  publish = "."
  command = ""

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/"
  to = "/ADHD%20Talk%20-%20Late%20Diagnosis.html"
  status = 302
  force = true

[[headers]]
  for = "/*.jsx"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
